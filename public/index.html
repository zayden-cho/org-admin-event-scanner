<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f5f4f0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>참석 접수</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #f5f4f0;
            --surface: #ffffff;
            --border:  #e2dfd8;
            --accent:  #FEE500;
            --text:    #1a1916;
            --text2:   #6b6760;
            --text3:   #a8a49e;
            --r:       16px;
            --font:    'Pretendard', -apple-system, 'Apple SD Gothic Neo', sans-serif;
        }

        html { height: 100%; }
        body {
            min-height: 100%; background: #e8e6e0; color: var(--text);
            font-family: var(--font); font-size: 16px; line-height: 1.5;
            -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased;
        }
        .app {
            max-width: 480px; margin: 0 auto; min-height: 100dvh;
            background: var(--bg);
            box-shadow: 0 0 40px rgba(0,0,0,.12);
        }
        /* safe-area: 노치/홈바 대응 */
        .screen { padding-left:  max(20px, env(safe-area-inset-left)); padding-right: max(20px, env(safe-area-inset-right)); }
        .form-submit-wrap { padding-bottom: max(40px, env(safe-area-inset-bottom)); }
        .qr-result-btns   { padding-bottom: max(20px, env(safe-area-inset-bottom)); }

        .screen { display: none; flex-direction: column; min-height: 100dvh; padding: 0 20px 40px; padding-left: max(20px, env(safe-area-inset-left)); padding-right: max(20px, env(safe-area-inset-right)); }
        .screen.active { display: flex; }
        .screen.slide-in { animation: slideIn .22s ease forwards; }
        @keyframes slideIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

        .topbar { display:flex; align-items:center; gap:10px; padding:16px 0 0; margin-bottom:28px; }
        .back-btn {
            width:44px; height:44px; background:var(--surface); border:1px solid var(--border);
            border-radius:12px; color:var(--text); font-size:18px; cursor:pointer;
            display:flex; align-items:center; justify-content:center; flex-shrink:0;
        }
        .back-btn:active { background:#e8e5df; }
        .topbar-title { font-size:18px; font-weight:700; letter-spacing:-.02em; }

        .home-wrap { flex:1; display:flex; flex-direction:column; justify-content:center; padding:40px 0; }
        .home-krew-badge {
            display:inline-flex; align-items:center; gap:7px;
            background:#1a1916; border:1px solid #1a1916;
            border-radius:100px; padding:6px 14px; margin-bottom:24px;
        }
        .home-krew-dot { width:6px; height:6px; background:var(--accent); border-radius:50%; flex-shrink:0; }
        .home-krew { font-size:12px; font-weight:700; letter-spacing:.1em; color:var(--accent); text-transform:uppercase; }
        .home-title { font-size:32px; font-weight:900; letter-spacing:-.04em; line-height:1.15; margin-bottom:12px; word-break:keep-all; }
        .home-desc  { font-size:14px; color:var(--text2); margin-bottom:44px; line-height:1.65; }
        .home-section-label { font-size:11px; font-weight:600; color:var(--text3); letter-spacing:.1em; text-transform:uppercase; margin-bottom:12px; }
        .home-btns { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .home-btn {
            min-height:150px; border:none; border-radius:20px; cursor:pointer;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding:20px 14px; text-align:center; transition:transform .12s,opacity .12s;
        }
        .home-btn:active { transform:scale(.96); opacity:.9; }
        .home-btn-checkin {
            background:linear-gradient(145deg,#FEE500 0%,#e6cf00 100%);
            color:#000; box-shadow:0 8px 24px rgba(180,160,0,.22);
        }
        .home-btn-register {
            background:linear-gradient(145deg,#f5f3ee 0%,#e8e4db 100%);
            color:#111017; box-shadow:0 8px 24px rgba(0,0,0,.12);
        }
        .home-btn-register.disabled { background:var(--surface); border:1.5px solid var(--border); color:var(--text3); box-shadow:none; cursor:not-allowed; opacity:.5; }
        .home-btn-text strong { display:block; font-size:24px; font-weight:900; letter-spacing:-.04em; line-height:1.2; margin-bottom:8px; }
        .home-btn-text span   { font-size:11px; line-height:1.45; word-break:keep-all; opacity:.6; }
        .home-btn-checkin  .home-btn-text span { color:#000; }
        .home-btn-register .home-btn-text span { color:#111017; }

        .screen-desc {
            font-size:13.5px; color:var(--text2); line-height:1.7; margin-bottom:28px;
            padding:14px 16px; background:var(--surface); border-radius:12px; border-left:3px solid var(--accent);
        }
        .form-group { margin-bottom:18px; }
        .form-label { display:block; font-size:13px; font-weight:600; color:var(--text2); margin-bottom:8px; }
        .req { color:var(--accent); margin-left:2px; }
        .opt { color:var(--text3); font-weight:400; font-size:12px; margin-left:4px; }
        .form-input, .form-select {
            width:100%; min-height:58px; padding:0 16px;
            background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r);
            color:var(--text); font-size:16px; font-family:var(--font); outline:none;
            transition:border-color .2s,box-shadow .2s; -webkit-appearance:none; appearance:none;
        }
        .form-input:focus, .form-select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(254,229,0,.15); }
        .form-input::placeholder { color:var(--text3); }
        .form-select option { background:#fff; }
        .select-wrap { position:relative; }
        .select-wrap::after { content:'▾'; position:absolute; right:16px; top:50%; transform:translateY(-50%); color:var(--text3); pointer-events:none; }
        .form-hint { font-size:12px; color:var(--text3); margin-top:6px; padding-left:4px; }
        .form-submit-wrap { margin-top:auto; padding-top:24px; }

        .lunch-toggle { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .lunch-btn {
            min-height:56px; border-radius:var(--r); border:1.5px solid var(--border);
            background:var(--surface); color:var(--text2);
            font-size:15px; font-weight:600; font-family:var(--font); cursor:pointer; transition:all .15s;
        }
        .lunch-btn.selected { background:var(--accent); border-color:var(--accent); color:#000; font-weight:700; }
        .lunch-btn:active { transform:scale(.97); }

        .schedule-options { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .schedule-btn {
            min-height:100px; border-radius:var(--r); border:1.5px solid var(--border);
            background:var(--surface); color:var(--text); font-family:var(--font);
            cursor:pointer; padding:14px 12px; text-align:center; transition:all .15s; white-space:pre-line;
        }
        .schedule-btn strong { display:block; font-size:16px; font-weight:800; letter-spacing:-.03em; margin-bottom:4px; }
        .schedule-btn span   { font-size:11px; color:var(--text2); line-height:1.5; }
        .schedule-btn.selected { background:#1a1916; border-color:#1a1916; color:#fff; }
        .schedule-btn.selected span { color:rgba(255,255,255,.6); }
        .schedule-btn:active { transform:scale(.97); }

        .btn {
            width:100%; min-height:62px; border:none; border-radius:var(--r);
            font-size:17px; font-weight:700; font-family:var(--font); cursor:pointer;
            display:flex; align-items:center; justify-content:center; gap:8px;
            letter-spacing:-.02em; transition:transform .12s,opacity .12s;
        }
        .btn:active:not(:disabled) { transform:scale(.97); opacity:.9; }
        .btn:disabled { opacity:.35; cursor:not-allowed; }
        .btn-primary { background:linear-gradient(135deg,#FEE500,#e6cf00); color:#000; box-shadow:0 6px 20px rgba(180,160,0,.3); }
        .btn-ghost   { background:transparent; border:1.5px solid var(--border); color:var(--text2); }
        .btn-ghost:active:not(:disabled) { background:var(--surface); }
        .btn-action  { background:var(--surface); border:1.5px solid #1a1916; color:#1a1916; }

        .qr-result-wrap {
            flex:1; display:flex; flex-direction:column;
            align-items:center; justify-content:center; text-align:center; padding:32px 0 20px;
        }
        .qr-title   { font-size:24px; font-weight:900; letter-spacing:-.04em; margin-bottom:8px; }
        .qr-message { font-size:14px; color:var(--text2); margin-bottom:28px; line-height:1.65; }
        .qr-card {
            width:260px; height:260px; background:#fff; border-radius:20px;
            display:flex; align-items:center; justify-content:center;
            padding:16px; margin-bottom:28px;
            box-shadow:0 4px 20px rgba(0,0,0,.08);
            border: 3px solid transparent;
            transition: border-color .2s;
        }
        .qr-card canvas, .qr-card img { width:228px !important; height:228px !important; }
        .qr-title { transition: color .2s; }
        .qr-result-btns { width:100%; display:flex; flex-direction:column; gap:10px; }

        .loading-overlay {
            position:fixed; inset:0; background:rgba(240,238,234,.85);
            backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
            display:none; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:200;
        }
        .loading-overlay.show { display:flex; }
        .spinner { width:46px; height:46px; border:4px solid rgba(180,160,0,.2); border-top-color:var(--accent); border-radius:50%; animation:spin .75s linear infinite; }
        .loading-text { font-size:14px; color:var(--text2); }
        @keyframes spin { to{transform:rotate(360deg)} }
    </style>
</head>
<body>
<div class="app" id="app">

    <!-- 홈 -->
    <div class="screen active" id="s-home">
        <div class="home-wrap">
            <div class="home-krew-badge">
                <span class="home-krew-dot"></span>
                <span class="home-krew">크루유니언</span>
            </div>
            <div class="home-title" id="home-title">참석 접수</div>
            <div class="home-desc">아래에서 해당되는 항목을 선택해 주세요.</div>
            <div class="home-section-label">항목 선택</div>
            <div class="home-btns">
                <button class="home-btn home-btn-checkin" id="btn-checkin">
          <span class="home-btn-text">
            <strong>참석 확인</strong>
            <span>사전 신청 하신 분들의 출석 확인</span>
          </span>
                </button>
                <button class="home-btn home-btn-register" id="btn-register">
          <span class="home-btn-text">
            <strong>현장 신청</strong>
            <span id="register-sub">현장에서 바로 신청하시는 분들</span>
          </span>
                </button>
            </div>
        </div>
    </div>

    <!-- 참석확인 폼 -->
    <div class="screen" id="s-checkin">
        <div class="topbar">
            <button class="back-btn" id="btn-checkin-back">←</button>
            <div class="topbar-title">참석 확인</div>
        </div>
        <div class="screen-desc">사전 신청 시 입력하신 <strong>법인·전화번호</strong>가 정확히 일치해야 합니다.</div>
        <div class="form-group">
            <label class="form-label" for="ci-corp">법인 <span class="req">*</span></label>
            <div class="select-wrap">
                <select class="form-select" id="ci-corp"><option value="">법인을 선택해 주세요</option></select>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label" for="ci-phone">전화번호 <span class="req">*</span></label>
            <input class="form-input" id="ci-phone" type="tel" placeholder="01012345678" autocomplete="tel" inputmode="numeric" />
            <div class="form-hint">숫자만 입력하면 자동으로 000-0000-0000 형식으로 표시돼요</div>
        </div>
        <div class="form-group" id="ci-lunch-group">
            <label class="form-label" id="ci-meal-label"><span id="ci-meal-text"></span> <span class="req">*</span></label>
            <div class="lunch-toggle">
                <button type="button" class="lunch-btn" id="ci-lunch-yes" data-value="예">먹어요</button>
                <button type="button" class="lunch-btn" id="ci-lunch-no"  data-value="아니오">안먹어요</button>
            </div>
            <input type="hidden" id="ci-lunch" value="" />
        </div>
        <div class="form-submit-wrap">
            <button class="btn btn-primary" id="btn-checkin-submit">참석 확인하기</button>
        </div>
    </div>

    <!-- 현장신청 폼 -->
    <div class="screen" id="s-register">
        <div class="topbar">
            <button class="back-btn" id="btn-register-back">←</button>
            <div class="topbar-title">현장 신청</div>
        </div>
        <div class="screen-desc">현장에서 처음 참여하시는 분들을 위한 신청 화면입니다.</div>
        <div class="form-group">
            <label class="form-label" for="re-corp">법인 <span class="req">*</span></label>
            <div class="select-wrap">
                <select class="form-select" id="re-corp"><option value="">법인을 선택해 주세요</option></select>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label" for="re-ldap">LDAP <span class="opt">(없으면 빈칸)</span></label>
            <input class="form-input" id="re-ldap" type="text" placeholder="영문 아이디 (없으면 빈칸)" autocomplete="off" inputmode="email" />
        </div>
        <div class="form-group">
            <label class="form-label" for="re-name">이름 <span class="req">*</span></label>
            <input class="form-input" id="re-name" type="text" placeholder="홍길동" autocomplete="name" inputmode="text" />
        </div>
        <div class="form-group">
            <label class="form-label" for="re-phone">전화번호 <span class="req">*</span></label>
            <input class="form-input" id="re-phone" type="tel" placeholder="01012345678" autocomplete="tel" inputmode="numeric" />
            <div class="form-hint">숫자만 입력하면 자동으로 000-0000-0000 형식으로 표시돼요</div>
        </div>
        <div class="form-group" id="re-lunch-group">
            <label class="form-label" id="re-meal-label"><span id="re-meal-text"></span> <span class="req">*</span></label>
            <div class="lunch-toggle">
                <button type="button" class="lunch-btn" id="re-lunch-yes" data-value="예">먹어요</button>
                <button type="button" class="lunch-btn" id="re-lunch-no"  data-value="아니오">안먹어요</button>
            </div>
            <input type="hidden" id="re-lunch" value="" />
        </div>
        <div class="form-group" id="schedule-group" style="display:none">
            <label class="form-label">참여 일정 선택 <span class="req">*</span></label>
            <div class="schedule-options" id="schedule-options"></div>
            <input type="hidden" id="re-schedule" value="" />
        </div>
        <div class="form-submit-wrap">
            <button class="btn btn-primary" id="btn-register-submit">현장 신청하기</button>
        </div>
    </div>

    <!-- QR 결과 화면 (CHECKIN/ONSITE/NOSUB/NOMEM 모두 통합) -->
    <div class="screen" id="s-qr">
        <div class="qr-result-wrap">
            <div class="qr-title"   id="qr-title">접수 완료</div>
            <div class="qr-message" id="qr-message">아래 QR 코드를 운영진에게 보여주세요.</div>
            <div class="qr-card"    id="qr-card"><div id="qr-code"></div></div>
            <div class="qr-result-btns">
                <button class="btn btn-ghost" id="btn-qr-home">처음으로</button>
            </div>
        </div>
    </div>


</div>

<div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">처리 중...</div>
</div>

<script>
    (function() {
        /* ── 설정값 기본값 (서버에서 덮어씀) ── */
        var CORPS = [], ON_SITE_OPEN = true, ENABLE_MEAL = false, MEAL_LABEL = '식사', ENABLE_SCHEDULE = false, SCHEDULE_OPTIONS = null;

        /* ── 서버에서 설정 받아오기 (/api/config) ── */
        fetch('/api/config')
            .then(function(r) { return r.json(); })
            .then(function(cfg) {
                CORPS            = cfg.corps           || [];
                ON_SITE_OPEN     = cfg.onSiteOpen      !== false;
                ENABLE_MEAL      = cfg.enableMeal      === true;
                MEAL_LABEL       = cfg.mealLabel       || '식사';
                ENABLE_SCHEDULE  = cfg.enableSchedule  === true;
                SCHEDULE_OPTIONS = cfg.scheduleOptions || null;

                /* 타이틀 */
                var t = document.getElementById('home-title');
                if (t) { t.textContent = (cfg.eventTitle || '참석') + ' 참석 접수'; }
                document.title = cfg.eventTitle || '참석 접수';

                initPage();
            })
            .catch(function() { initPage(); });

        /* ── 초기화 (config 수신 후 실행) ── */
        function initPage() {
            /* 법인 목록 채우기 */
            ['ci-corp', 're corp'].forEach(function(id) {
                var sel = document.getElementById(id.replace(' ', '-'));
                if (!sel) return;
                CORPS.forEach(function(c) {
                    var opt = document.createElement('option');
                    opt.value = c; opt.textContent = c;
                    sel.appendChild(opt);
                });
            });

            /* 현장신청 버튼 */
            if (!ON_SITE_OPEN) {
                var btn = document.getElementById('btn-register');
                var sub = document.getElementById('register-sub');
                btn.classList.add('disabled');
                sub.textContent = '현재 현장 신청이 마감되었어요';
            }

            /* 식사 라벨 */
            document.getElementById('ci-meal-text').textContent = MEAL_LABEL + ' 식사 여부';
            document.getElementById('re-meal-text').textContent = MEAL_LABEL + ' 식사 여부';

            /* 식사 비활성 시 숨김 */
            if (!ENABLE_MEAL) {
                document.getElementById('ci-lunch-group').style.display = 'none';
                document.getElementById('re-lunch-group').style.display = 'none';
            }

            /* 참여일정 */
            if (ENABLE_SCHEDULE && SCHEDULE_OPTIONS && SCHEDULE_OPTIONS.length > 0) {
                var grp  = document.getElementById('schedule-group');
                var cont = document.getElementById('schedule-options');
                grp.style.display = 'block';
                SCHEDULE_OPTIONS.forEach(function(opt) {
                    var b = document.createElement('button');
                    b.type = 'button'; b.className = 'schedule-btn'; b.dataset.value = opt.value;
                    b.innerHTML = '<strong>' + opt.label + '</strong><span>' + opt.sub.replace(/\n/g, '<br>') + '</span>';
                    b.addEventListener('click', function() {
                        document.querySelectorAll('.schedule-btn').forEach(function(x) { x.classList.remove('selected'); });
                        this.classList.add('selected');
                        document.getElementById('re-schedule').value = this.dataset.value;
                    });
                    cont.appendChild(b);
                });
            }

            /* 이벤트 바인딩 */
            document.getElementById('btn-checkin').addEventListener('click', function() { goTo('checkin'); });
            document.getElementById('btn-register').addEventListener('click', function() {
                if (!ON_SITE_OPEN) return;
                goTo('register');
            });
            document.getElementById('btn-checkin-back').addEventListener('click',  function() { goTo('home'); });
            document.getElementById('btn-register-back').addEventListener('click', function() { goTo('home'); });
            document.getElementById('btn-checkin-submit').addEventListener('click',  submitCheckIn);
            document.getElementById('btn-register-submit').addEventListener('click', submitRegister);
            document.getElementById('btn-qr-home').addEventListener('click',         function() { goTo('home'); });


            /* 식사 토글 */
            [['ci-lunch-yes','ci-lunch-no','ci-lunch'],['re-lunch-yes','re-lunch-no','re-lunch']].forEach(function(ids) {
                [ids[0], ids[1]].forEach(function(id) {
                    document.getElementById(id).addEventListener('click', function() {
                        document.getElementById(ids[0]).classList.remove('selected');
                        document.getElementById(ids[1]).classList.remove('selected');
                        this.classList.add('selected');
                        document.getElementById(ids[2]).value = this.dataset.value;
                    });
                });
            });

            /* 전화번호 포맷 */
            function applyPhoneFormat(input) {
                var d = input.value.replace(/[^0-9]/g, '').slice(0, 11);
                input.value = d.length <= 3 ? d
                    : d.length <= 7  ? d.slice(0,3) + '-' + d.slice(3)
                        : d.slice(0,3) + '-' + d.slice(3,7) + '-' + d.slice(7);
            }
            ['ci-phone', 're-phone'].forEach(function(id) {
                var el = document.getElementById(id);
                el.addEventListener('input', function() { applyPhoneFormat(this); });
                el.addEventListener('paste', function() { setTimeout(function() { applyPhoneFormat(el); }, 0); });
            });
        } /* end initPage */

        /* ── 화면 전환 ── */
        function resetForm(screenId) {
            var sc = document.getElementById(screenId);
            sc.querySelectorAll('input').forEach(function(el) { el.value = ''; });
            sc.querySelectorAll('select').forEach(function(el) { el.selectedIndex = 0; });
            sc.querySelectorAll('.lunch-btn, .schedule-btn').forEach(function(b) { b.classList.remove('selected'); });
        }

        function goTo(id) {
            document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active', 'slide-in'); });
            if (id === 'checkin')  resetForm('s-checkin');
            if (id === 'register') resetForm('s-register');
            var target = document.getElementById('s-' + id);
            target.classList.add('active');
            requestAnimationFrame(function() { target.classList.add('slide-in'); });
            window.scrollTo({ top: 0, behavior: 'instant' });
        }

        function setLoading(on) { document.getElementById('loading').classList.toggle('show', on); }

        /* ── QR 생성 ── */
        function generateQR(containerId, text) {
            var container = document.getElementById(containerId);
            container.innerHTML = '';
            new QRCode(container, {
                text: text, width: 228, height: 228,
                colorDark: '#000000', colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        /* ── QR 결과 색상 테이블 ──────────────────────────────────
           출석체크 (신규)   노랑  #FEE500
           출석체크 (중복)   주황  #f97316
           현장신청          파랑  #60a5fa
           미신청/비조합원   빨강  #ef4444
           ──────────────────────────────────────────────────────── */
        var QR_STYLES = {
            checkin_new: { titleColor: '#92700a', cardBorder: '#FEE500' },
            checkin_dup: { titleColor: '#c2410c', cardBorder: '#f97316' },
            onsite:      { titleColor: '#1d4ed8', cardBorder: '#60a5fa' },
            nosub:       { titleColor: '#dc2626', cardBorder: '#ef4444' },
            nomem:       { titleColor: '#dc2626', cardBorder: '#ef4444' },
        };

        /* ── 결과 처리 ── */
        function handleResult(res) {
            if (res.status === 'error') {
                alert(res.message || '오류가 발생했습니다.\n운영진에게 문의하세요.');
                return;
            }

            var qrString  = res.qrType + ':' + res.qrId;
            var styleKey  = 'checkin_new';

            if      (res.qrType === 'CHECKIN' && !res.isDuplicate) styleKey = 'checkin_new';
            else if (res.qrType === 'CHECKIN' &&  res.isDuplicate) styleKey = 'checkin_dup';
            else if (res.qrType === 'ONSITE')                      styleKey = 'onsite';
            else if (res.qrType === 'NOSUB')                       styleKey = 'nosub';
            else if (res.qrType === 'NOMEM')                       styleKey = 'nomem';

            var style = QR_STYLES[styleKey];
            document.getElementById('qr-title').style.color     = style.titleColor;
            document.getElementById('qr-card').style.borderColor = style.cardBorder;

            generateQR('qr-code', qrString);
            goTo('qr');
        }

        /* ── 참석확인 제출 → POST /api/checkin ── */
        function submitCheckIn() {
            var corp  = document.getElementById('ci-corp').value.trim();
            var phone = document.getElementById('ci-phone').value.replace(/[^0-9]/g, '');
            var lunch = document.getElementById('ci-lunch').value;
            if (!corp)             { alert('법인을 선택해 주세요.'); return; }
            if (phone.length < 10) { alert('전화번호를 올바르게 입력해 주세요.'); return; }
            if (ENABLE_MEAL && !lunch) { alert(MEAL_LABEL + ' 식사 여부를 선택해 주세요.'); return; }
            setLoading(true);
            fetch('/api/checkin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ corp: corp, phone: phone, lunch: lunch })
            })
                .then(function(r) { return r.json(); })
                .then(function(res) { setLoading(false); handleResult(res); })
                .catch(function() { setLoading(false); alert('서버 오류가 발생했습니다.\n운영진에게 문의하세요.'); });
        }

        /* ── 현장신청 제출 → POST /api/register ── */
        function submitRegister() {
            var corp     = document.getElementById('re-corp').value.trim();
            var ldap     = document.getElementById('re-ldap').value.trim();
            var name     = document.getElementById('re-name').value.trim();
            var phone    = document.getElementById('re-phone').value.replace(/[^0-9]/g, '');
            var lunch    = document.getElementById('re-lunch').value;
            var schedEl  = document.getElementById('re-schedule');
            var schedule = schedEl ? schedEl.value : '';
            if (!corp)             { alert('법인을 선택해 주세요.'); return; }
            if (!name)             { alert('이름을 입력해 주세요.'); return; }
            if (phone.length < 10) { alert('전화번호를 올바르게 입력해 주세요.'); return; }
            if (ENABLE_MEAL && !lunch) { alert(MEAL_LABEL + ' 식사 여부를 선택해 주세요.'); return; }
            if (ENABLE_SCHEDULE && SCHEDULE_OPTIONS && SCHEDULE_OPTIONS.length > 0 && !schedule) {
                alert('참여 일정을 선택해 주세요.'); return;
            }
            setLoading(true);
            fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ corp: corp, ldap: ldap, name: name, phone: phone, schedule: schedule, lunch: lunch })
            })
                .then(function(r) { return r.json(); })
                .then(function(res) { setLoading(false); handleResult(res); })
                .catch(function() { setLoading(false); alert('서버 오류가 발생했습니다.\n운영진에게 문의하세요.'); });
        }

    })();
</script>
</body>
</html>
