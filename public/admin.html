<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>크루유니언 — 운영진 QR 스캐너</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f0e11">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

        :root{
            --bg:#0f0e11; --surface:#1c1a24; --border:#2e2a3e; --accent:#FEE500;
            --text:#ede9f8; --text2:#9b96b8; --text3:#5f5a78; --r:16px;
            --font:'Pretendard',-apple-system,'Apple SD Gothic Neo',sans-serif;
        }
        html,body{height:100%}
        body{background:#0a0910;color:var(--text);font-family:var(--font);font-size:16px;
            -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
        .app{
            max-width:480px;margin:0 auto;min-height:100dvh;
            padding:0 20px 40px;
            padding-left:max(20px,env(safe-area-inset-left));
            padding-right:max(20px,env(safe-area-inset-right));
            padding-bottom:max(40px,env(safe-area-inset-bottom));
            background:var(--bg);
            box-shadow:0 0 40px rgba(0,0,0,.4);
        }

        /* ── PIN 화면 ── */
        .pin-wrap{display:flex;min-height:100dvh;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding-bottom:env(safe-area-inset-bottom)}
        .pin-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(254,229,0,.08);
            border:1px solid rgba(254,229,0,.2);border-radius:100px;padding:5px 14px;margin-bottom:20px}
        .pin-badge-dot{width:6px;height:6px;background:var(--accent);border-radius:50%}
        .pin-badge-text{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.1em;text-transform:uppercase}
        .pin-title{font-size:22px;font-weight:800;letter-spacing:-.03em;margin-bottom:8px}
        .pin-sub{font-size:14px;color:var(--text2);margin-bottom:36px}
        .pin-input{
            width:100%;max-width:280px;height:72px;background:var(--surface);border:2px solid var(--border);
            border-radius:var(--r);color:var(--text);font-size:32px;font-weight:700;font-family:var(--font);
            text-align:center;letter-spacing:.2em;outline:none;-webkit-appearance:none;transition:border-color .2s
        }
        .pin-input:focus{border-color:var(--accent)}
        .pin-error{font-size:13px;color:#ef4444;margin-top:12px;min-height:20px}
        .pin-btn{
            width:100%;max-width:280px;height:58px;margin-top:16px;background:linear-gradient(135deg,#FEE500,#e6cf00);
            border:none;border-radius:var(--r);font-size:16px;font-weight:700;font-family:var(--font);color:#000;
            cursor:pointer;transition:opacity .15s
        }
        .pin-btn:active{opacity:.85}

        /* ── 스캐너 화면 ── */
        .scanner-wrap{display:none;flex-direction:column;padding-top:24px}
        .admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
        .admin-title{font-size:16px;font-weight:700;color:var(--text2)}
        .admin-logout{font-size:12px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:var(--font);padding:4px 8px}
        .admin-logout:active{color:var(--text2)}

        .scanner-label{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
        #qr-reader{width:100%;border-radius:20px;overflow:hidden;background:#000;margin-bottom:16px}
        #qr-reader video{width:100% !important}
        #qr-reader img[alt="Info icon"]{display:none !important}

        .scanner-status{text-align:center;font-size:14px;color:var(--text2);padding:12px;
            background:var(--surface);border-radius:var(--r);margin-bottom:16px;min-height:48px;
            display:flex;align-items:center;justify-content:center}

        .scan-error{display:none;padding:14px 16px;margin-bottom:12px;background:rgba(239,68,68,.08);
            border:1px solid rgba(239,68,68,.2);border-radius:var(--r);font-size:14px;color:#ef4444;
            text-align:center;white-space:pre-line}

        .dup-banner{display:none;padding:14px 18px;background:rgba(239,68,68,.10);
            border-bottom:1px solid rgba(239,68,68,.2);border-radius:20px 20px 0 0}
        .dup-banner-title{font-size:14px;font-weight:800;color:#ef4444;margin-bottom:3px}
        .dup-banner-sub{font-size:12px;color:rgba(239,68,68,.8)}

        .result-card{display:none;background:var(--surface);border:1px solid var(--border);
            overflow:hidden;margin-bottom:12px;animation:fadeIn .2s ease}
        .result-card.has-dup{border-color:rgba(239,68,68,.4);border-radius:0 0 20px 20px}
        .result-card.no-dup{border-radius:20px}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

        .result-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);
            display:flex;align-items:center;justify-content:space-between}
        .status-badge{display:inline-flex;align-items:center;gap:6px;border-radius:100px;padding:4px 12px}
        .status-dot{width:6px;height:6px;border-radius:50%}
        .status-text{font-size:12px;font-weight:700}
        .result-time{font-size:11px;color:var(--text3)}

        .result-name-row{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
        .result-name{font-size:26px;font-weight:900;letter-spacing:-.04em;margin-bottom:4px}
        .result-corp{font-size:14px;color:var(--text2)}

        .result-fields{padding:8px 0}
        .result-field{display:flex;align-items:center;padding:12px 20px;border-bottom:1px solid var(--border)}
        .result-field:last-of-type{border-bottom:none}
        .field-key{font-size:12px;color:var(--text3);width:52px;flex-shrink:0}
        .field-val{font-size:15px;font-weight:700;color:var(--text)}

        .special-card{display:none;border-radius:20px;overflow:hidden;margin-bottom:12px;animation:fadeIn .2s ease}
        .special-card-inner{padding:28px 24px;text-align:center}
        .special-icon{font-size:48px;margin-bottom:16px}
        .special-title{font-size:20px;font-weight:800;letter-spacing:-.03em;margin-bottom:8px}
        .special-msg{font-size:14px;line-height:1.65}

        .next-scan-btn{display:none;width:100%;min-height:58px;background:transparent;
            border:1.5px solid var(--border);border-radius:var(--r);color:var(--text2);
            font-size:16px;font-weight:700;font-family:var(--font);cursor:pointer;
            transition:background .15s;margin-bottom:12px}
        .next-scan-btn:active{background:var(--surface)}

        .loading-overlay{position:fixed;inset:0;background:rgba(10,9,15,.7);backdrop-filter:blur(4px);
            display:none;align-items:center;justify-content:center;z-index:100}
        .loading-overlay.show{display:flex}
        .spinner{width:40px;height:40px;border:3px solid rgba(254,229,0,.2);border-top-color:var(--accent);
            border-radius:50%;animation:spin .7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div class="app">

    <!-- PIN 화면 -->
    <div class="pin-wrap" id="pin-wrap">
        <div class="pin-badge"><span class="pin-badge-dot"></span><span class="pin-badge-text">운영진 전용</span></div>
        <div class="pin-title">참석 조회</div>
        <div class="pin-sub">운영진 PIN을 입력해 주세요</div>
        <input class="pin-input" id="pin-input" type="password" inputmode="numeric" maxlength="8" placeholder="••••" />
        <div class="pin-error" id="pin-error"></div>
        <button class="pin-btn" id="pin-btn">확인</button>
    </div>

    <!-- 스캐너 화면 -->
    <div class="scanner-wrap" id="scanner-wrap">
        <div class="admin-header">
            <div class="admin-title">참석 조회</div>
            <button class="admin-logout" id="logout-btn">로그아웃</button>
        </div>
        <div class="scanner-label">QR 코드 스캔</div>
        <div id="qr-reader"></div>
        <div class="scanner-status" id="scanner-status">카메라를 QR 코드에 가져다 대주세요</div>
        <div class="scan-error"  id="scan-error"></div>
        <div class="dup-banner"  id="dup-banner">
            <div class="dup-banner-title">이미 처리된 코드</div>
            <div class="dup-banner-sub" id="dup-banner-sub"></div>
        </div>
        <div class="result-card no-dup" id="result-card">
            <div class="result-header">
                <div class="status-badge" id="status-badge">
                    <span class="status-dot"  id="status-dot"></span>
                    <span class="status-text" id="status-text"></span>
                </div>
                <div class="result-time" id="result-time"></div>
            </div>
            <div class="result-name-row">
                <div class="result-name" id="result-name"></div>
                <div class="result-corp" id="result-corp"></div>
            </div>
            <div class="result-fields" id="result-fields"></div>
        </div>
        <div class="special-card" id="special-card">
            <div class="special-card-inner">
                <div class="special-icon"  id="special-icon"></div>
                <div class="special-title" id="special-title"></div>
                <div class="special-msg"   id="special-msg"></div>
            </div>
        </div>
        <button class="next-scan-btn" id="next-scan-btn">다음 참석자 스캔</button>
    </div>

</div>

<div class="loading-overlay" id="loading"><div class="spinner"></div></div>

<script>
    (function() {
        var _pin        = '';
        var _scanner    = null, _scanning = false, _processing = false;
        var _enableMeal = false, _enableSchedule = false;

        var pinWrap      = document.getElementById('pin-wrap');
        var pinInput     = document.getElementById('pin-input');
        var pinError     = document.getElementById('pin-error');
        var pinBtn       = document.getElementById('pin-btn');
        var scannerWrap  = document.getElementById('scanner-wrap');
        var scanStatus   = document.getElementById('scanner-status');
        var scanError    = document.getElementById('scan-error');
        var dupBanner    = document.getElementById('dup-banner');
        var dupBannerSub = document.getElementById('dup-banner-sub');
        var resultCard   = document.getElementById('result-card');
        var statusBadge  = document.getElementById('status-badge');
        var statusDot    = document.getElementById('status-dot');
        var statusText   = document.getElementById('status-text');
        var resultTime   = document.getElementById('result-time');
        var resultName   = document.getElementById('result-name');
        var resultCorp   = document.getElementById('result-corp');
        var resultFields = document.getElementById('result-fields');
        var specialCard  = document.getElementById('special-card');
        var specialIcon  = document.getElementById('special-icon');
        var specialTitle = document.getElementById('special-title');
        var specialMsg   = document.getElementById('special-msg');
        var nextScanBtn  = document.getElementById('next-scan-btn');
        var logoutBtn    = document.getElementById('logout-btn');
        var loading      = document.getElementById('loading');

        var BADGE_TYPES = {
            CHECKIN: { bg:'rgba(34,197,94,.12)',  dot:'#22c55e', text:'#22c55e', label:'참석확인 (사전신청)' },
            ONSITE:  { bg:'rgba(96,165,250,.12)', dot:'#60a5fa', text:'#60a5fa', label:'현장신청'            }
        };

        pinBtn.addEventListener('click', verifyPin);
        pinInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') verifyPin(); });
        nextScanBtn.addEventListener('click', resumeScanner);
        logoutBtn.addEventListener('click', logout);

        /* ── API 호출 (같은 도메인 /api/admin, CORS 불필요) ── */
        function callAPI(action, payload) {
            var body = Object.assign({ action: action }, payload);
            return fetch('/api/admin', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(body)
            }).then(function(res) { return res.json(); });
        }

        /* ── PIN 확인 + FEATURES 수신 (1번 요청으로 처리) ── */
        function verifyPin() {
            var pin = pinInput.value.trim();
            if (!pin) { pinError.textContent = 'PIN을 입력해 주세요.'; return; }
            setLoading(true);
            callAPI('verifyAndConfig', { pin: pin })
                .then(function(res) {
                    setLoading(false);
                    if (res.status === 'ok') {
                        _pin            = pin;
                        _enableMeal     = res.enableMeal     === true;
                        _enableSchedule = res.enableSchedule === true;
                        pinWrap.style.display     = 'none';
                        scannerWrap.style.display = 'flex';
                        startScanner();
                    } else {
                        pinError.textContent = res.message || 'PIN이 올바르지 않습니다.';
                        pinInput.value = ''; pinInput.focus();
                    }
                })
                .catch(function() {
                    setLoading(false);
                    pinError.textContent = '서버 연결에 실패했습니다.';
                });
        }

        /* ── QR 스캐너 ── */
        function startScanner() {
            if (_scanner) { _scanner.clear(); }
            _scanner  = new Html5Qrcode('qr-reader');
            _scanning = true;
            _scanner.start(
                { facingMode: 'environment' },
                { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
                onScanSuccess,
                function() {}
            ).catch(function(err) {
                scanStatus.textContent = '카메라를 사용할 수 없습니다: ' + err;
            });
        }

        function onScanSuccess(decodedText) {
            if (!_scanning || _processing) return;
            _processing = true; _scanning = false;
            _scanner.stop().catch(function(){});
            scanStatus.textContent = '처리 중...';
            hideResults();
            setLoading(true);
            callAPI('scanQR', { qr: decodedText, pin: _pin })
                .then(function(res) {
                    setLoading(false); _processing = false;
                    scanStatus.textContent = '스캔 완료 — 결과를 확인해 주세요';
                    showResult(res);
                })
                .catch(function() {
                    setLoading(false); _processing = false;
                    scanStatus.textContent = '오류가 발생했습니다';
                    showScanError('서버 연결에 실패했습니다.');
                    nextScanBtn.style.display = 'block';
                });
        }

        function resumeScanner() {
            hideResults();
            scanStatus.textContent    = '카메라를 QR 코드에 가져다 대주세요';
            nextScanBtn.style.display = 'none';
            startScanner();
        }

        /* ── 결과 표시 ── */
        function showResult(res) {
            if (res.status === 'error' || res.status === 'unauthorized') {
                showScanError(res.message || '오류가 발생했습니다.');
                nextScanBtn.style.display = 'block'; return;
            }
            if (res.status === 'notfound') {
                showScanError(res.message || 'QR 정보를 찾을 수 없습니다.');
                nextScanBtn.style.display = 'block'; return;
            }
            if (res.type === 'NOSUB') {
                specialCard.style.background = '#1c1500';
                specialCard.style.border     = '1px solid #b45309';
                specialTitle.textContent = '사전신청 없음';
                specialMsg.textContent   = '사전신청을 하지 않은 분입니다.\n현장신청을 안내해 주세요.';
                specialCard.style.display = 'block';
                nextScanBtn.style.display = 'block'; return;
            }
            if (res.type === 'NOMEM') {
                specialCard.style.background = '#1c0a0a';
                specialCard.style.border     = '1px solid #dc2626';
                specialTitle.textContent = '비조합원';
                specialMsg.textContent   = '조합원 확인이 되지 않는 분입니다.\n현장신청 데이터가 저장되었습니다.';
                specialCard.style.display = 'block';
                nextScanBtn.style.display = 'block'; return;
            }

            var b = BADGE_TYPES[res.type] || { bg:'rgba(255,255,255,.1)', dot:'#fff', text:'#fff', label:res.type };

            if (res.alreadyConfirmed) {
                dupBanner.style.display  = 'block';
                dupBannerSub.textContent = res.confirmedAt ? res.confirmedAt + '에 이미 처리됨' : '이미 처리된 코드';
                resultCard.className     = 'result-card has-dup';
            } else {
                dupBanner.style.display = 'none';
                resultCard.className    = 'result-card no-dup';
            }

            statusBadge.style.background = b.bg;
            statusDot.style.background   = b.dot;
            statusText.style.color       = b.text;
            statusText.textContent       = b.label;

            var timeVal = res.checkedAt || res.registeredAt || '-';
            resultTime.textContent = timeVal ? timeVal + ' 접수' : '-';
            resultName.textContent = res.name || '-';
            resultCorp.textContent = res.corp || '-';

            var fields = [];
            if (res.ldap && res.ldap !== '-' && res.ldap !== '') fields.push({ key:'LDAP', val:res.ldap });
            fields.push({ key:'전화', val:res.phone || '-' });
            if (res.type === 'CHECKIN') fields.push({ key:'신청', val:res.regStatus || '-' });
            if (_enableMeal) fields.push({ key:'식사', val:res.lunch || '-' });
            if (_enableSchedule && res.schedule && res.schedule !== '-' && res.schedule !== 'undefined') {
                fields.push({ key:'일정', val:res.schedule });
            }
            if (res.memberStatus) fields.push({ key:'구분', val:res.memberStatus });

            resultFields.innerHTML = fields.map(function(f, i) {
                var last = i === fields.length - 1 ? ' style="border-bottom:none"' : '';
                return '<div class="result-field"' + last + '>'
                    + '<span class="field-key">' + f.key + '</span>'
                    + '<span class="field-val">' + f.val + '</span>'
                    + '</div>';
            }).join('');

            resultCard.style.display  = 'block';
            nextScanBtn.style.display = 'block';
        }

        function showScanError(msg) {
            scanError.textContent   = msg;
            scanError.style.display = 'block';
        }
        function hideResults() {
            resultCard.style.display  = 'none';
            specialCard.style.display = 'none';
            dupBanner.style.display   = 'none';
            scanError.style.display   = 'none';
        }
        function logout() {
            _pin = '';
            if (_scanner) { _scanner.stop().catch(function(){}); _scanner = null; }
            _scanning = false; _processing = false;
            hideResults();
            nextScanBtn.style.display   = 'none';
            scannerWrap.style.display   = 'none';
            pinWrap.style.display       = 'flex';
            pinInput.value              = '';
            pinError.textContent        = '';
            scanStatus.textContent      = '카메라를 QR 코드에 가져다 대주세요';
        }
        function setLoading(on) { loading.classList.toggle('show', on); }
    })();
</script>
</body>
</html>
